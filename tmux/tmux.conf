# terminal stuff

# https://github.com/tmux/tmux/issues/696
#set -g default-terminal "screen-256color"
#set -g -a terminal-overrides ",xterm*:Tc"
#set -s default-terminal "tmux-256color"
#set -as terminal-overrides ",*-256color:Tc"
set -s default-terminal "tmux-256color"
set -as terminal-overrides ",xterm*:Tc,tmux*:Tc,putty*:Tc,*-256color:Tc"

# set global environment variable TMUX_VERSION
#
# awk -v tv="master"  'BEGIN { print tv >= 2.4 }' # should print 1
# awk -v tv="master"  'BEGIN { print tv <= 2.1 }' # should print 0
# awk -v tv="2.3"     'BEGIN { print tv >= 2.4 }' # should print 0
# awk -v tv="2.3-rc3" 'BEGIN { print tv >= 2.4 }' # should print 0
# awk -v tv="2.4"     'BEGIN { print tv >= 2.4 }' # should print 1
# awk -v tv="2.4-rc3" 'BEGIN { print tv >= 2.4 }' # should print 1

run-shell "tmux setenv -g TMUX_VERSION $($_ -V | cut -c 6-)"

# vi mode

set -g mode-keys vi

# UTF-8 is always on in modern tmux (3.x+)

# make these environment variables available to tmux show-env when launching a
# new session or attaching an old one; see also bin/tmux-sync-environment

set -g update-environment \
  "\
  COLORTERM \
  DISPLAY \
  GPG_AGENT_INFO \
  SSH_AGENT_PID \
  SSH_ASKPASS \
  SSH_AUTH_SOCK \
  SSH_CONNECTION \
  TERM \
  WINDOWID \
  XAUTHORITY \
  "

# delay for tmux to determine if input is part of a function or meta sequence

set -s escape-time 50
set -g focus-events on

# window titles

set -g automatic-rename on
# set -g allow-rename off
# TODO

# control keys

set-window-option -g xterm-keys on

# normal keybindings

# ... nesting

# ... ... C-b b -- second level
# ... ... C-b b b -- third level

bind-key b send-prefix

# ... pane movement

# TODO
bind-key C-j command-prompt -p "join pane from:" "join-pane -h -s '%%'"
bind-key C-s command-prompt -p "send pane to:" "join-pane -h -t '%%'"

# ... alternate split mappings

#bind-key v split-window -h
#unbind-key s
#bind-key s split-window -v

# ... reload ~/.tmux.conf

bind-key R source-file ~/.tmux.conf\; display "reloaded tmux.conf"

# ... home/end

bind-key -n Home send Escape "OH"
bind-key -n End send Escape "OF"

# ... paste

unbind-key p
bind-key p paste-buffer

# copy-mode / scrollback

set -s set-clipboard on
set -g allow-passthrough on
set -g history-limit 65536

# Clipboard integration toggle.  @clipboard_enabled controls whether
# selections pipe through clip-in (system clipboard) or just tmux load-buffer
# (tmux-only).  Default on; toggle with prefix C-c.  See _docs/clipboard.org.
set -g @clipboard_enabled 1

# ... vi copy mode keys

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi Home send-keys -X start-of-line
bind-key -T copy-mode-vi End send-keys -X end-of-line
bind-key -T copy-mode-vi C-y send-keys -X copy-pipe-and-cancel 'cat >> ~/tmux.out'\; display 'appended to ~/tmux.out'

# Yank bindings respect @clipboard_enabled: when 1, pipe through clip-in
# (system clipboard); when 0, pipe through `tmux load-buffer -` so the
# selection lands in the tmux buffer only (paste with `prefix p`).
bind-key -T copy-mode-vi y {
    if-shell -F '#{@clipboard_enabled}' {
        send-keys -X copy-pipe-and-cancel 'clip-in'
    } {
        send-keys -X copy-pipe-and-cancel 'tmux load-buffer -'
    }
}
bind-key -T copy-mode-vi M-y {
    if-shell -F '#{@clipboard_enabled}' {
        send -X copy-pipe-and-cancel 'clip-in'
        display 'copied to system clipboard'
    } {
        send -X copy-pipe-and-cancel 'tmux load-buffer -'
        display 'copied to tmux buffer (clipboard sync OFF)'
    }
}

# MouseDragEnd1Pane: copy selection (system clipboard or tmux buffer based
# on @clipboard_enabled), then decide whether to stay in copy mode based on
# whether we entered copy mode via the drag or were already there from
# scrolling.
#   scroll_position == 0  : user was at the prompt; the drag itself entered
#                           copy mode -- exit copy mode after copying so the
#                           cursor stays at the prompt
#   scroll_position  > 0  : user was already scrolled back (already in copy
#                           mode) -- stay in copy mode so they can keep
#                           navigating; press q to exit
bind-key -T copy-mode-vi MouseDragEnd1Pane {
    if-shell -F '#{@clipboard_enabled}' {
        if-shell -F '#{scroll_position}' {
            send-keys -X copy-pipe-no-clear 'clip-in'
            display 'copied to system clipboard (q to exit copy mode)'
        } {
            send-keys -X copy-pipe-and-cancel 'clip-in'
            display 'copied to system clipboard'
        }
    } {
        if-shell -F '#{scroll_position}' {
            send-keys -X copy-pipe-no-clear 'tmux load-buffer -'
            display 'copied to tmux buffer / clipboard OFF (q to exit)'
        } {
            send-keys -X copy-pipe-and-cancel 'tmux load-buffer -'
            display 'copied to tmux buffer (clipboard sync OFF)'
        }
    }
}

# DoubleClick1Pane / TripleClick1Pane: select word / line under cursor and
# pipe to clipboard.  tmux's defaults select but don't copy; the bindings
# below add the copy step.  Works both in copy-mode and outside (tmux
# enters copy-mode automatically for the click).
bind-key -T root DoubleClick1Pane {
    select-pane
    copy-mode -M
    send-keys -X select-word
    if-shell -F '#{@clipboard_enabled}' {
        send-keys -X copy-pipe-no-clear 'clip-in'
    } {
        send-keys -X copy-pipe-no-clear 'tmux load-buffer -'
    }
}
bind-key -T root TripleClick1Pane {
    select-pane
    copy-mode -M
    send-keys -X select-line
    if-shell -F '#{@clipboard_enabled}' {
        send-keys -X copy-pipe-no-clear 'clip-in'
    } {
        send-keys -X copy-pipe-no-clear 'tmux load-buffer -'
    }
}
bind-key -T copy-mode-vi DoubleClick1Pane {
    send-keys -X select-word
    if-shell -F '#{@clipboard_enabled}' {
        send-keys -X copy-pipe-no-clear 'clip-in'
    } {
        send-keys -X copy-pipe-no-clear 'tmux load-buffer -'
    }
}
bind-key -T copy-mode-vi TripleClick1Pane {
    send-keys -X select-line
    if-shell -F '#{@clipboard_enabled}' {
        send-keys -X copy-pipe-no-clear 'clip-in'
    } {
        send-keys -X copy-pipe-no-clear 'tmux load-buffer -'
    }
}
bind-key -T choice-mode-vi h send-keys -X tree-collapse
bind-key -T choice-mode-vi l send-keys -X tree-expand
bind-key -T choice-mode-vi H send-keys -X tree-collapse-all
bind-key -T choice-mode-vi L send-keys -X tree-expand-all

# ... prefix C-y append buffer to ~/tmux.out
# ... prefix C copy buffer to clipboard
# ... prefix P set buffer from clipboard

bind-key C-y run-shell 'tmux show-buffer >> ~/tmux.out'; \
bind-key C run-shell 'tmux show-buffer | clip-in'; \
bind-key P run-shell 'tmux set-buffer \"$(clip-out)\"; tmux paste-buffer'; \

# ... save entire scrollback to a file with default filename

bind-key S command-prompt \
  -p 'save scrollback to filename:' \
  -I '~/tmux-#h-#S-#I-#P-#{window_activity}.history' \
  'capture-pane -S -; save-buffer -a %1; delete-buffer'

# mouse

set -g mouse on
bind m set -g mouse on\; display 'mouse: on'
bind M set -g mouse off\; display 'mouse: off'

# Toggle key-table -- mirrors vim/nvim <leader>t* namespace.
# Enter via `prefix t`, then a single key picks the toggle:
#   t C -- cycle clipboard sync  (matches <leader>tC in vim/nvim;
#          C as in "Clipboard")
#   t X -- raw bypass: mouse off + clipboard off in one keystroke
bind t switch-client -T clip-toggle

bind -T clip-toggle C {
    if-shell -F '#{@clipboard_enabled}' {
        set -g @clipboard_enabled 0
        set -s set-clipboard off
        display 'tmux clipboard sync: OFF (selections stay in tmux buffer)'
    } {
        set -g @clipboard_enabled 1
        set -s set-clipboard on
        display 'tmux clipboard sync: ON'
    }
}

# Raw bypass: disables both mouse mode AND clipboard sync in one keystroke,
# so the outer terminal (e.g. Terminal.app) handles the next mouse selection
# natively into its own clipboard.  Press again to restore both.  Useful
# when stuck in nested-tmux + Terminal.app where OSC 52 doesn't propagate
# -- see clipboard.org "Nested tmux" scenario.
bind -T clip-toggle X {
    if-shell -F '#{mouse}' {
        set -g mouse off
        set -g @clipboard_enabled 0
        set -s set-clipboard off
        display 'raw bypass: ON (mouse + clipboard sync disabled; drag-select to copy via outer terminal)'
    } {
        set -g mouse on
        set -g @clipboard_enabled 1
        set -s set-clipboard on
        display 'raw bypass: OFF (mouse + clipboard sync restored)'
    }
}

# status bar

# ... hostname, loadavg, time (note: this doesn't highlight right in vim)

set -g status-right '\
#[fg=blue]#{host_short} \
#[fg=black]load #[fg=blue]#(loadavg) \
#[fg=black]time #[fg=blue]#(datetime-iso8601 --local --precision=seconds)\
'

set -g status-right-length 150

# look and feel

set -g pane-border-style fg=green
set -g pane-active-border-style fg=brightred
set -g window-status-current-style bg=blue,fg=white

# tpm

# ... list of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

# ... other examples:
#
# set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# ... initialize tmux plugin manager (keep this line at the very bottom of
# tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
